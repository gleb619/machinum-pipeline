# Test fixture: Bootstrap list configuration
# Used for testing BootstrapCommand with bootstrap tool list
version: 1.0.0
type: tools
name: "Test Bootstrap List Tools"
body:
  registry:
    type: builtin

  # List of tools to bootstrap during setup phase
  bootstrap:
    - prettier
    - eslint
    - workspace-init

  tools:
    - name: workspace-init
      description: "Workspace initialization tool"

    - name: qwen-summary
      description: "Qwen-based text summarization"
      config:
        model: qwen2.5-72b
        temperature: 0.7

    - name: prettier
      description: "Markdown formatter (node tool)"
      type: node

    - name: eslint
      description: "JavaScript linter (node tool)"
      type: node
