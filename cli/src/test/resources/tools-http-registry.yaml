# Test fixture: HTTP tool registry configuration
# Used for testing DownloadCommand with remote tool registry
version: 1.0.0
type: tools
name: "Test HTTP Registry Tools"
body:
  registry:
    type: http
    url: https://raw.githubusercontent.com/gleb619/machinum-pipeline/refs/heads/main/tools.yaml
    refresh: on_startup

  bootstrap:
    - workspace

  tools:
    - name: workspace
      description: "Workspace initialization tool"

    - name: qwen-summary
