# Bernstein Configuration for Machinum-Pipeline
# Pluggable document processing orchestration engine

project:
  name: machinum-pipeline
  description: Document processing engine with state machine pipelines
  language: typescript
  package_manager: pnpm
  monorepo: true
  workspace_patterns:
    - "packages/*/package.json"

workspace:
  repos:
    - name: machinum-pipeline
      path: .

worktree_setup:
  setup_command: "/bin/bash -c 'source /home/boris/.nvm/nvm.sh && nvm use v22.20.0 && pnpm install'"

internal_llm_provider: codex

goal: "Implement Git worktree isolation for Source and Target (T023)"

budget: "$10"

# User-defined agent assignments, inline format (best for Bernstein parsing)
# Forbidden: claude, kimi
role_model_policy:
  architect:   {cli: codex, effort: high}
  backend:     {cli: blackbox, effort: high}
  frontend:    {cli: opencode, effort: high}
  qa:          {cli: qwen, effort: medium}
  docs:        {cli: kilo, effort: medium}
  editing:     {cli: gemini, model: gemini-2.5-flash, effort: medium}
  security:    {cli: goose, effort: high}
  reviewer:    {cli: goose, effort: medium}
  boilerplate: {cli: pi, effort: low}

quality_gates:
  enabled: true
  gates:
    - type: tests
      command: pnpm test
      required: true
      timeout_seconds: 120
    - type: types
      command: pnpm typecheck
      required: true
      timeout_seconds: 60
    - type: lint
      command: pnpm lint
      required: true
      timeout_seconds: 60
    - type: build
      command: pnpm build
      required: true
      timeout_seconds: 180
  require_approval_for_unsafe: true

storage:
  backend: memory
  retention_days: 30

git:
  auto_push: false
  rebase_before_merge: true

constraints:
  - "Node.js v22.20.0"
  - "TypeScript strict mode"
  - "vitest for tests"
  - "Biome for lint/format"
  - "Follow existing code patterns in packages/"
  - "No claude, no kimi"
