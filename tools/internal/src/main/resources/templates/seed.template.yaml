# Machinum Pipeline Root Configuration
# Generated by machinum setup

version: 1.0.0
type: root
name: "My Pipeline Workspace"
description: "Default workspace configuration"

body:
  # Execution settings
  execution:
    parallel: false
    resume: true
    snapshot:
      enabled: true
      mode: copy

  # Error handling
  fallback:
    retry:
      max: 3
      backoff:
        type: fixed
        start: 1s

  # Cleanup policy
  cleanup:
    pass: 7d
    fail: 14d
    passes: 5
    fails: 10

  # Environment variables
  secrets:
    - ".env"
  env:
    # Add your environment variables here
    # API_KEY: "{{env.OPENAI_API_KEY}}"
