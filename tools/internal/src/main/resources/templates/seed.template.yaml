# Machinum Pipeline Root Configuration
# Generated by machinum setup

version: 1.0.0
type: root
name: "My Pipeline Workspace"
description: "Default workspace configuration"

body:
  # Execution settings
  execution:
    parallel: false
    resume: true
    manifest-snapshot:
      enabled: true
      mode: copy

  # Error handling
  error-handling:
    retry:
      max-attempts: 3
      backoff:
        type: fixed
        initial-delay: 2s

  # Cleanup policy
  cleanup:
    success: 7d
    failed: 14d
    success-runs: 5
    failed-runs: 10

  # Environment variables
  env-files:
    - ".env"
  env:
    # Add your environment variables here
    # API_KEY: "{{env.OPENAI_API_KEY}}"
