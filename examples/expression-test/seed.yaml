version: 1.0.0
type: root
name: "Expression Test Runtime Config"
description: "Configuration for testing expression resolver integration"
body:
  metadata:
    book_id: "expression-test-book"
  execution:
    parallel: false
    concurrency: 4
    resume: true
    snapshot:
      enabled: true
      mode: copy
  fallback:
    retry:
      max: 3
      backoff:
        type: fixed
        start: 2s
        max: 30s
        multiplier: 2.0
        jitter: 0.15
    strategies:
      - exception: "TimeoutException"
        strategy: retry
      - exception: "ValidationException"
        strategy: skip
      - exception: ".*"
        strategy: stop
  pipeline-config:
    batch: 10
    window: 5
    cooldown: 5s
    override: false
  cleanup:
    success: 5d
    failed: 7d
    success-runs: 5
    failed-runs: 10
  env:
    API_KEY: "test-api-key-123"
    AWS_REGION: "us-east-1"
    REGION: "us-east-1"
