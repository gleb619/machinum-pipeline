version: 1.0.0
type: root
name: "Expression Test Runtime Config"
description: "Configuration for testing expression resolver integration"
body:
  tools: ".mt/tools.yaml"
  metadata:
    book_id: "expression-test-book"
  execution:
    parallel: false
    max-concurrency: 4
    resume: true
    manifest-snapshot:
      enabled: true
      mode: copy
  error-handling:
    retry:
      max-attempts: 3
      backoff:
        type: fixed
        initial-delay: 2s
        max-delay: 30s
        multiplier: 2.0
        jitter: 0.15
    strategies:
      - exception: "TimeoutException"
        strategy: retry
      - exception: "ValidationException"
        strategy: skip
      - exception: ".*"
        strategy: stop
  pipeline-config:
    batch-size: 10
    window-batch-size: 5
    cooldown: 5s
    allow-override-mode: false
  cleanup:
    success: 5d
    failed: 7d
    success-runs: 5
    failed-runs: 10
  env:
    API_KEY: "test-api-key-123"
    AWS_REGION: "us-east-1"
    REGION: "us-east-1"
