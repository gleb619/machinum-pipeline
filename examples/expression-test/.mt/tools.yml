version: 1.0.0
type: tools
name: "Default Toolset"
description: "Example tool configurations"

body:
  # Execution targets
  execution-targets:
    default: local
    targets:
      - name: local
        type: local

  # Tool definitions
  tools:
    # Example: Internal tool (SPI-based)
    - name: peek
      description: "Log input for debugging"
      config:
        log-level: info

    # Example: External shell script
    - name: uppercase-transformer
      description: "Convert text to uppercase"
      config:
        work-dir: "{{rootDir}}"
        runtime: shell
        source:
          type: file
          url: ".mt/scripts/transformers/uppercase.sh"
        timeout: 30s

    # Example: External Groovy script
    - name: text-validator
      description: "Validate text content"
      config:
        return-type: Boolean
        runtime: groovy
        source:
          type: file
          url: ".mt/scripts/validators/not_empty.groovy"
        timeout: 10s
