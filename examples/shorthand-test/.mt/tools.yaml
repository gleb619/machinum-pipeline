# Basic Shorthand Forms Example
# Demonstrates minimal shorthand syntax for tools.yaml
# See: docs/yaml-schema.md#30-shorthand-forms

version: 1.0.0
type: tools
name: "Shorthand Tools"
description: "Basic example of shorthand forms"

body:
  # Bootstrap list shorthand - strings only
  bootstrap:
    - workspace

  tools:
    - name: peek
      extends: nooptool
      description: "Example of custom tool declaration"

